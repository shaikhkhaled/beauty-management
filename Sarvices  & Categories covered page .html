<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Services & Categories</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #2769e5, #39485c);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      flex-direction: row;
      background-color: rgb(203, 113, 113);
      width: 90%;
      max-width: 1000px;
      height: 80vh;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
    .container-2 {
      display: flex;
      flex-direction: row;
      background-color: rgb(219, 192, 192);
      width: 90%;
      max-width: 1000px;
      height: 80vh;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .section {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .section h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }

    .item {
      background-color: #f3f6fd;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      transition: 0.3s;
    }

    .item:hover {
      background-color: #68c668;
    }

    .categories {
      border-right: 1px solid #ddd;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
      }

      .categories {
        border-right: none;
        border-bottom: 1px solid #a97474;
      }
    }
    .section-2{
        background-color: rgb(18, 16, 13);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Categories Section -->
    <div class="section categories">
      <h2>Categories</h2>
      <div class="item">Hair</div>
      <div class="item">Skin Care</div>
      <div class="item">Makeup</div>
      <div class="item">Nails</div>
      <div class="item">Spa & Wellness</div>
    </div>
  </div>
  <div class="container-2">
    <!-- Services Section -->
    <div class="section categories">
      <h2>Services</h2>
      <div class="item">
        <form>    
           <input type="radio" name="hair cut "><label>Hair Bleach</label>
           <input type="radio" name="hair cut "><label>Hair Cut</label>
        </form>
      </div>
      <div class="item">
        <form>
        <input type="radio" name="skin care "><label>Face Pack</label>
        <input type="radio" name="skin care "><label>Face Mask</label>
        <input type="radio" name="skin care "><label> WAX</label>
        <input type="radio" name="skin care "><label> Lipstick Hip glors</label>
        </form>
      </div>
      <div class="item">
          <form>
        <input type="radio" name="Makeup "><label>Bridal Makeup</label>
        <input type="radio" name="Makeup "><label>Out-Door Makeup</label>
         <input type="radio" name="Makeup "><label> Removed Makeup</label>
        </form>
      </div>
      <div class="item">
        <form>
        <input type="radio" name="Nails "><label>Nails Polish</label>
        <input type="radio" name="Nails "><label>Nails Buffer</label>
         <input type="radio" name="Nails "><label> UV / LED Nails Lamps</label>
        </form>
      </div>
      <div class="item">
        <form>
        <input type="radio" name="spa "><label>full Body Massage</label>
        <input type="radio" name="spa "><label>Sports Massage</label>
         <input type="radio" name="Makeup "><label>Hot Stone Massage</label>
        </form>
     </div>
    </div>
  </div>
</body>
</html>
