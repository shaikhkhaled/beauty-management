<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery & Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #8859d8;
      color: #333;
    }
    header {
      background: url('./img/back.jpg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: left;
      text-align: left;
      color: rgb(241, 236, 236);
      border-radius: 50% ;
      padding: 20px;
    }
    header h1 {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
    }
    header p {
      font-size: 1.5rem;
      max-width: 600px;
    }
    section.gallery-preview {
      padding: 40px 20px;
      text-align: center;
    }
    section.gallery-preview h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 0 20px;
    }
    .gallery-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }
    .gallery-grid img:hover {
      transform: scale(1.05);
    }
    .cta {
      margin-top: 40px;
      font-size: 1.2rem;
    }
    .cta a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .cta a:hover {
      background: #555;
    }
  </style>
</head>
<body>

  <header>
    <h1>Image Gallery & Portfolio</h1>
    <p>Discover a curated collection of creative works, photos, and professional showcases.</p>
  </header>

  <section class="gallery-preview">
    <h2>Gallery Preview</h2>
    <div class="gallery-grid">
      <img src="./img/uv led img.jpg" alt="Art 1">
      <img src="./img/make up.jpg" alt="Art 2">
      <img src="./img/face pack.jpg" alt="Art 3">
      <img src="./img/massage.jpg" alt="Art 4">
    </div>
    <div class="cta">
      <p>Explore the full collection</p>
      <a href="#">View Portfolio</a>
    </div>
  </section>

</body>
</html>
