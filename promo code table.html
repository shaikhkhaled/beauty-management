<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo codes </title>
    <style>
         body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
     th {
      background-color: #f0f0f0;
    }
     .active {
      color: rgb(116, 204, 234);
      font-weight: bold;
    }

    .inactive {
      color: red;
      font-weight: bold;
    }
    .ac{
        background-color: rgb(50, 50, 143) ;
    }
    .bg{
            background-color: rgb(95, 95, 151);
        }
        h2{
            text-align: center;
        }
    </style>
</head>
<body class="ac">
    <h2>11.Promotions & Coupons</h2>

  <table class="bg">
    <thead>
      <tr>
        <th>Coupon ID</th>
        <th>Code</th>
        <th>Description</th>
        <th>Discount (%)</th>
        <th>Valid From</th>
        <th>Valid Until</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td><span class="code">WELCOME10</span></td>
        <td>10% off on your first booking</td>
        <td>10.00</td>
        <td>2025-06-01</td>
        <td>2025-07-01</td>
        <td class="active">Active</td>
      </tr>
      <tr>
        <td>2</td>
        <td><span class="code">SUMMER20</span></td>
        <td>20% discount on selected services</td>
        <td>20.00</td>
        <td>2025-05-15</td>
        <td>2025-06-15</td>
        <td class="inactive">Expired</td>
      </tr>
    </tbody>
  </table>
    
</body>
</html>
